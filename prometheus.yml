global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ai-marketing-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:3001" ]
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: instance
        replacement: "production-api"

  - job_name: "redis"
    static_configs:
      - targets: [ "redis:6379" ]
